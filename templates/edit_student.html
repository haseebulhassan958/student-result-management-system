{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-warning text-dark">
                <h4 class="mb-0">
                    <i class="bi bi-pencil-square me-2"></i>Edit Student
                </h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Student Name</label>
                        <input type="text" name="name" class="form-control"
                               value="{{ student.name }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Roll Number</label>
                        <input type="text" name="roll_number" class="form-control"
                               value="{{ student.roll_number }}" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Class</label>
                        <select name="class_name" class="form-select" required>
                            <option value="">-- Select Class --</option>
                            <option value="BS-IT" {% if student.class_name == 'BS-IT' %}selected{% endif %}>BS-IT</option>
                            <option value="BS-CS" {% if student.class_name == 'BS-CS' %}selected{% endif %}>BS-CS</option>
                            <option value="BS-SE" {% if student.class_name == 'BS-SE' %}selected{% endif %}>BS-SE</option>
                            <option value="MCS" {% if student.class_name == 'MCS' %}selected{% endif %}>MCS</option>
                            <option value="MIT" {% if student.class_name == 'MIT' %}selected{% endif %}>MIT</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning text-dark fw-bold">
                            <i class="bi bi-check-circle me-1"></i>Update Student
                        </button>
                        <a href="/student/{{ student.id }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Back to Student
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
