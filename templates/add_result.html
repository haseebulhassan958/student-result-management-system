{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header bg-success text-white">
                <h4 class="mb-0">
                    <i class="bi bi-journal-plus me-2"></i>Add Result for {{ student.name }}
                </h4>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Subject</label>
                        <select name="subject" class="form-select" required>
                            <option value="">-- Select Subject --</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="English">English</option>
                            <option value="Islamiat">Islamiat</option>
                            <option value="Pakistan Studies">Pakistan Studies</option>
                            <option value="Chemistry">Chemistry</option>
                            <option value="Biology">Biology</option>
                            <option value="Artificial Intelligence">Artificial Intelligence</option>
                            <option value="Data Structures">Data Structures</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Marks Obtained</label>
                        <input type="number" name="marks_obtained" class="form-control"
                               placeholder="e.g. 85" min="0" max="100" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Total Marks</label>
                        <input type="number" name="total_marks" class="form-control"
                               placeholder="e.g. 100" min="1" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-bold">Semester</label>
                        <select name="semester" class="form-select" required>
                            <option value="">-- Select Semester --</option>
                            <option value="Semester 1">Semester 1</option>
                            <option value="Semester 2">Semester 2</option>
                            <option value="Semester 3">Semester 3</option>
                            <option value="Semester 4">Semester 4</option>
                            <option value="Semester 5">Semester 5</option>
                            <option value="Semester 6">Semester 6</option>
                            <option value="Semester 7">Semester 7</option>
                            <option value="Semester 8">Semester 8</option>
                        </select>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-success">
                            <i class="bi bi-check-circle me-1"></i>Add Result
                        </button>
                        <a href="/student/{{ student.id }}" class="btn btn-outline-secondary">
                            <i class="bi bi-arrow-left me-1"></i>Back to Student
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
